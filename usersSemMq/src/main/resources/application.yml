spring:
  application:
    name: usersSemMq

  datasource:
    url: jdbc:postgresql://localhost:5432/db_users_no_mq
    username: ${USERNAME}
    password: ${PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000 # 1 hour in milliseconds

email-service:
  url: http://localhost:8081

server:
  port: 8080